#  Server
server.port=8080

# ?? PostgreSQL
# Lee variables de entorno si existen, si no usa el valor por defecto
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/rambo_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:prime}
spring.datasource.driver-class-name=org.postgresql.Driver

# ?? JPA / Hibernate ????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ?? Jackson ????????????????????????????????????????????????
spring.jackson.serialization.write-dates-as-timestamps=false

# ?? Logging ???????????????????????????????????????????????
logging.level.com.rambo=DEBUG
logging.level.org.springframework.web=INFO
