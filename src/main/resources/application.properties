# Server
server.port=${PORT:8080}

# PostgreSQL — Railway inyecta PG* automaticamente; docker-compose usa SPRING_DATASOURCE_URL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:rambo_db}}
spring.datasource.username=${DB_USERNAME:${PGUSER:postgres}}
spring.datasource.password=${DB_PASSWORD:${PGPASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false

# Admin credentials — required, no defaults (set via env vars or Railway variables)
admin.username=${ADMIN_USERNAME}
admin.password=${ADMIN_PASSWORD}

# Logging
logging.level.com.rambo=INFO
logging.level.org.springframework.web=WARN
